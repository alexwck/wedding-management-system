# =============================================================================
# CI/CD Workflow: Wedding Management System
# =============================================================================
# Environment mapping:
#   - Pull requests to main/staging: lint, type-check, test
#   - Push to staging: checks + Supabase staging migrations + Vercel Preview deploy
#   - Push to main: checks + Supabase production migrations + Vercel production deploy
#   - Manual dispatch: deploy the selected GitHub environment from the selected ref
#
# Required GitHub environments:
#   - staging
#   - production
#
# Each environment must define:
#   Secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_ID,
#            VERCEL_TOKEN
#   Variables: VERCEL_ORG_ID, VERCEL_PROJECT_ID
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production

# Cancel superseded PR checks, but do not cancel in-flight push deployments after
# a database migration may have started.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target_environment || 'checks' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: 20.x

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ESLint static analysis
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Type Check: TypeScript compilation verification
  # ---------------------------------------------------------------------------
  type-check:
    name: type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm exec tsc -- --noEmit

  # ---------------------------------------------------------------------------
  # Test: Vitest unit/component tests
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # ---------------------------------------------------------------------------
  # Deploy staging: staging branch or manual staging dispatch.
  # Vercel target is Preview; GitHub/Supabase target is staging.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, type-check, test]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging')
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.deployment_url }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: npm ci

      - name: Run Supabase staging migrations
        id: migrate
        run: |
          echo "Linking to Supabase staging project..."
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

          echo "Running staging database migrations..."
          supabase db push

          echo "Migration completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          echo "Pulling Vercel Preview environment..."
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

          echo "Building for Vercel Preview..."
          vercel build --target=preview --token="$VERCEL_TOKEN"

          echo "Deploying to Vercel Preview..."
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --target=preview --token="$VERCEL_TOKEN")

          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOYMENT_URL"

      - name: Report staging deployment
        if: always()
        run: |
          echo "## Staging Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Supabase Migration**: ${{ steps.migrate.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Vercel Preview Deployment**: ${{ steps.deploy.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
            echo "- **Preview URL**: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Deploy production: main branch or manual production dispatch
  # ---------------------------------------------------------------------------
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, type-check, test]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment_url }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: npm ci

      - name: Run Supabase production migrations
        id: migrate
        run: |
          echo "Linking to Supabase production project..."
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

          echo "Running production database migrations..."
          supabase db push

          echo "Migration completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Deploy to Vercel production
        id: deploy
        run: |
          echo "Pulling Vercel production environment..."
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          echo "Building for Vercel production..."
          vercel build --prod --token="$VERCEL_TOKEN"

          echo "Deploying to Vercel production..."
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")

          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $DEPLOYMENT_URL"

      - name: Report production deployment
        if: always()
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Supabase Migration**: ${{ steps.migrate.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Vercel Deployment**: ${{ steps.deploy.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
            echo "- **Production URL**: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
