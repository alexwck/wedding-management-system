# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "chore: initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "chore: save progress before clarification"
  before_plan:
    enabled: false
    message: "chore: save progress before planning"
  before_tasks:
    enabled: false
    message: "chore: save progress before task generation"
  before_implement:
    enabled: false
    message: "chore: save progress before implementation"
  before_checklist:
    enabled: false
    message: "chore: save progress before checklist"
  before_analyze:
    enabled: false
    message: "chore: save progress before analysis"
  before_taskstoissues:
    enabled: false
    message: "chore: save progress before issue sync"
  after_constitution:
    enabled: true
    message: "docs: add project constitution"
  after_specify:
    enabled: true
    message: "docs: add specification"
  after_clarify:
    enabled: true
    message: "docs: clarify specification"
  after_plan:
    enabled: true
    message: "docs: add implementation plan"
  after_tasks:
    enabled: false
    message: "docs: add tasks"
  after_implement:
    enabled: true
    message: "feat: implementation progress"
  after_checklist:
    enabled: true
    message: "docs: add checklist"
  after_analyze:
    enabled: false
    message: "docs: add analysis report"
  after_taskstoissues:
    enabled: false
    message: "chore: sync tasks to issues"
